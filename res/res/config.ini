# chiux default configuration
# This file is a writable template. chiux will cache resolved executable paths here.

border_width=1
title_height=20
menu_height=20
grow_box_size=14
background_color=#C0C0C0
background_pixel=12632256
frame_active_pixel=0
frame_inactive_pixel=8421504
title_active_pixel=0
title_inactive_pixel=4210752
title_text_pixel=16777215
menu_pixel=13882323
menu_text_pixel=0
resolve_terminal_binary=true
terminal_command=chiux-te
terminal_feel=0
file_browser_command=chiux:open-file-manager

launcher=Terminal|chiux-te
launcher=Modern Terminal|chiux-te-2
launcher=Files|chiux:open-file-manager
launcher=Config|chiux-te -x sh -lc 'exec ${EDITOR:-vi} "$HOME/.config/chiux/config.ini"'

icon=Terminal|chiux-te|0|0
icon=Modern Terminal|chiux-te-2|0|0
icon=Files|chiux:open-file-manager|0|0
icon=Home|chiux:open-home-info|0|0
icon=Trash|xdg-open "$HOME/.local/share/Trash"|0|0
